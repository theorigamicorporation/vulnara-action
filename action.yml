name: 'Vulnara Scan'
description: 'Run a Vulnara security scan on a branch from CI using a service account, and optionally gate the build on findings.'
author: 'Vulnara'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  service-account:
    description: 'Vulnara service account username.'
    required: true
  token:
    description: 'Vulnara service account token (password). Store it as a GitHub secret.'
    required: true
  tenant:
    description: 'Vulnara tenant (workspace) id the service account belongs to.'
    required: true
  scan-tools:
    description: 'Comma-separated scan tool names or ids to run (e.g. "AEGIS,pdd").'
    required: true
  branch:
    description: 'Branch to scan. Defaults to the branch that triggered the workflow.'
    required: false
    default: ''
  repository:
    description: 'owner/name of the repository to scan in Vulnara. Defaults to the current GitHub repository.'
    required: false
    default: ''
  git-token-id:
    description: 'Vulnara git token id to use for cloning (required for private repositories).'
    required: false
    default: ''
  fail-on:
    description: 'Fail the job if a finding at or above this severity is found: none | low | medium | high | critical.'
    required: false
    default: 'critical'
  create-issue:
    description: 'Create an issue in the repository for findings.'
    required: false
    default: 'false'
  auto-remediate:
    description: 'Open a fix pull request for findings (requires create-issue).'
    required: false
    default: 'false'
  wait-timeout:
    description: 'Max seconds to wait for the scan(s) to finish before failing.'
    required: false
    default: '1800'
  poll-interval:
    description: 'Seconds between scan status checks.'
    required: false
    default: '15'
  app-url:
    description: 'Vulnara web app base URL, used to build links to scans in the platform (override for non-prod).'
    required: false
    default: 'https://vulnara.rso.dev'
  gateway-url:
    description: 'Vulnara GraphQL gateway URL (override for non-prod).'
    required: false
    default: 'https://vulnara-gw.rso.dev/graphql'
  token-url:
    description: 'OAuth token endpoint (override for non-prod).'
    required: false
    default: 'https://auth.theorigamicorporation.com/application/o/token/'
  oauth-client-id:
    description: 'OAuth client id used for the service-account token exchange (override for non-prod).'
    required: false
    default: 'hl04e6MSMRY60LdpGh5rdMRQjkPxvldAYoqXdzo4'

outputs:
  scan-result-ids:
    description: 'Space-separated ids of the scan results that were started.'
  highest-severity:
    description: 'The highest finding severity discovered across the scans (or "none").'
  passed:
    description: '"true" if the scans passed the fail-on gate, "false" otherwise.'

runs:
  using: 'docker'
  image: 'Dockerfile'
